<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sentinel – Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col">
  <header class="bg-slate-800 text-white py-3 px-4">
    <h1 class="text-lg font-semibold">Sentinel</h1>
    <p class="text-slate-300 text-sm">Equipment checkout</p>
  </header>

  <main class="flex-1 p-4 max-w-md mx-auto w-full">
    <!-- Asset card: loading / loaded / error -->
    <section id="asset-card" class="mb-6 rounded-lg bg-white shadow p-4 border border-slate-200" aria-live="polite">
      <div id="asset-loading" class="text-slate-500">Loading asset…</div>
      <div id="asset-loaded" class="hidden">
        <p class="font-medium text-slate-800"><span id="asset-id"></span></p>
        <p class="text-slate-600 text-sm"><span id="asset-type"></span></p>
      </div>
      <div id="asset-error" class="hidden text-red-600 text-sm"></div>
    </section>

    <!-- Checkout form (when asset is Available) -->
    <form id="checkout-form" class="space-y-4 hidden">
      <div>
        <label for="staff-name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
        <input type="text" id="staff-name" name="staff_name" required autocomplete="name"
          class="w-full rounded border border-slate-300 px-3 py-2.5 text-base">
      </div>
      <div>
        <label for="staff-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" id="staff-email" name="staff_email" required autocomplete="email"
          class="w-full rounded border border-slate-300 px-3 py-2.5 text-base">
      </div>
      <div id="form-error" class="hidden text-red-600 text-sm" role="alert"></div>
      <button type="submit" id="submit-btn" class="w-full py-3 min-h-[44px] rounded bg-slate-800 text-white font-medium text-base">
        Confirm Loan
      </button>
    </form>

    <!-- Check-in form (when asset is Loaned) -->
    <form id="checkin-form" class="space-y-4 hidden">
      <div>
        <label for="checkin-name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
        <input type="text" id="checkin-name" name="staff_name" required autocomplete="name"
          class="w-full rounded border border-slate-300 px-3 py-2.5 text-base">
      </div>
      <div>
        <label for="checkin-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" id="checkin-email" name="staff_email" required autocomplete="email"
          class="w-full rounded border border-slate-300 px-3 py-2.5 text-base">
      </div>
      <div id="checkin-form-error" class="hidden text-red-600 text-sm" role="alert"></div>
      <button type="submit" id="checkin-submit-btn" class="w-full py-3 min-h-[44px] rounded bg-slate-800 text-white font-medium text-base">
        Check In
      </button>
    </form>

    <!-- Checkout success (hidden until after checkout POST) -->
    <section id="success-section" class="hidden rounded-lg bg-white shadow p-6 border border-slate-200" aria-live="polite">
      <h2 class="text-lg font-semibold text-slate-800 mb-2">Loan confirmed!</h2>
      <p class="text-slate-700 mb-1">Asset: <span id="success-asset-id"></span> (<span id="success-asset-type"></span>)</p>
      <p class="text-slate-700 mb-2">Due date: <span id="success-due-date"></span></p>
      <p id="success-receipt-note" class="text-slate-600 text-sm">A receipt has been sent to your email.</p>
    </section>

    <!-- Check-in success (hidden until after check-in POST) -->
    <section id="checkin-success-section" class="hidden rounded-lg bg-white shadow p-6 border border-slate-200" aria-live="polite">
      <h2 class="text-lg font-semibold text-slate-800 mb-2">Return logged!</h2>
      <p class="text-slate-700">Please place the device on the designated shelf for Admin verification.</p>
    </section>
  </main>

  <script src="checkout.js"></script>
</body>
</html>
